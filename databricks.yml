bundle:
  name: jj-hr-digital-demo

sync:
  include:
    - .env

variables:
  catalog:
    description: Unity Catalog catalog name
    default: bx4
  schema:
    description: Unity Catalog schema name
    default: hrd_2030
  warehouse_id:
    description: SQL Warehouse ID
    default: "aa06644a4b0be047"
  app_name:
    description: Databricks App name
    default: hire-right-agent-app
  vs_endpoint_name:
    description: Vector Search endpoint name
    default: bx4_hrd_vs_endpoint
  model_endpoint_name:
    description: ML model serving endpoint name
    default: hr-predictive-hiring-endpoint
  agent_endpoint_name:
    description: Agent serving endpoint name
    default: hire-right-agent-endpoint
  llm_endpoint_name:
    description: LLM serving endpoint (via AI Gateway)
    default: databricks-gpt-5-4
  mlflow_experiment:
    description: MLflow experiment name for the ML model (notebook 05)
    default: ml-hr-predictive-hiring-evals
  agent_mlflow_experiment:
    description: MLflow experiment name for the agent evaluations (notebook 06)
    default: agent-predictive-hiring-evals
  agent_name:
    description: Registered model name for the agent
    default: agent-hire_right
  ml_model_name:
    description: Registered model name for the ML hiring model
    default: ml_hr_predictive_hiring
  genie_space_id:
    description: Genie Space ID for HR analytics (set after space is created in UI or notebook 04)
    default: "01f13a0f6a081fabbea933cfb0db1d01"

resources:
  dashboards:
    hiring_analytics:
      display_name: "Jackson and Jackson HR Digital — Hiring Analytics"
      file_path: ./dashboard/hiring_analytics.lvdash.json
      warehouse_id: ${var.warehouse_id}
      parent_path: "/Workspace/Users/${workspace.current_user.userName}"

  jobs:
    hrd_setup_job:
      name: jj-hr-digital-pipeline
      parameters:
        - name: train_model
          default: "false"
        - name: deploy_agent
          default: "true"
      tasks:
        - task_key: load_bronze
          notebook_task:
            notebook_path: ./notebooks/00_load_bronze.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_name: raw_data

        - task_key: load_silver
          depends_on:
            - task_key: load_bronze
          notebook_task:
            notebook_path: ./notebooks/01_load_silver.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: build_vector_index_rag
          depends_on:
            - task_key: load_bronze
          notebook_task:
            notebook_path: ./notebooks/01b_build_vector_search.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              volume_name: raw_data
              vs_endpoint_name: ${var.vs_endpoint_name}
              vs_index_name: hr_resumes_vs_index

        - task_key: classify_and_quality
          depends_on:
            - task_key: load_silver
          notebook_task:
            notebook_path: ./notebooks/02_apply_data_quality_and_classification.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: build_gold
          depends_on:
            - task_key: classify_and_quality
          notebook_task:
            notebook_path: ./notebooks/03_build_gold.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: create_uc_functions
          depends_on:
            - task_key: build_gold
          notebook_task:
            notebook_path: ./notebooks/04b_create_uc_functions.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: apply_business_semantics
          depends_on:
            - task_key: build_gold
          notebook_task:
            notebook_path: ./notebooks/03b_apply_business_semantics.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}

        - task_key: genie_space
          depends_on:
            - task_key: apply_business_semantics
          notebook_task:
            notebook_path: ./notebooks/04_create_genie_space.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}

        - task_key: train_condition
          depends_on:
            - task_key: genie_space
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.train_model}}"
            right: "true"

        - task_key: ml_model
          depends_on:
            - task_key: train_condition
              outcome: "true"
          notebook_task:
            notebook_path: ./notebooks/05_train_ml_model.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              mlflow_experiment: ${var.mlflow_experiment}
              model_name: ${var.ml_model_name}
              endpoint_name: ${var.model_endpoint_name}

        - task_key: deploy_app
          depends_on:
            - task_key: agent
          notebook_task:
            notebook_path: ./notebooks/07_deploy_app.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              agent_endpoint_name: ${var.agent_endpoint_name}
              warehouse_id: ${var.warehouse_id}
              app_name: ${var.app_name}
              genie_space_id: ${var.genie_space_id}

        - task_key: drift_monitor
          depends_on:
            - task_key: deploy_app
            - task_key: ml_model
          notebook_task:
            notebook_path: ./notebooks/05b_create_drift_monitor.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              endpoint_name: ${var.model_endpoint_name}
              warehouse_id: ${var.warehouse_id}

        - task_key: grant_app_permissions
          depends_on:
            - task_key: deploy_app
          notebook_task:
            notebook_path: ./notebooks/09_grant_app_permissions.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              app_name: ${var.app_name}
              genie_space_id: ${var.genie_space_id}
              warehouse_id: ${var.warehouse_id}
              agent_endpoint_name: ${var.agent_endpoint_name}

        - task_key: agent_condition
          depends_on:
            - task_key: genie_space
            - task_key: build_vector_index_rag
            - task_key: create_uc_functions
          condition_task:
            op: EQUAL_TO
            left: "{{job.parameters.deploy_agent}}"
            right: "true"

        - task_key: agent
          depends_on:
            - task_key: agent_condition
              outcome: "true"
          notebook_task:
            notebook_path: ./notebooks/06_evaluate_register_agent.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              genie_space_id: ${var.genie_space_id}
              vs_index_name: hr_resumes_vs_index
              vs_endpoint_name: ${var.vs_endpoint_name}
              model_endpoint_name: ${var.model_endpoint_name}
              agent_name: ${var.agent_name}
              agent_endpoint_name: ${var.agent_endpoint_name}
              llm_endpoint: ${var.llm_endpoint_name}
              mlflow_experiment: ${var.agent_mlflow_experiment}

        - task_key: refresh_dashboard
          depends_on:
            - task_key: apply_business_semantics
          notebook_task:
            notebook_path: ./notebooks/08_refresh_dashboard.ipynb
            base_parameters:
              catalog: ${var.catalog}
              schema: ${var.schema}
              warehouse_id: ${var.warehouse_id}
              dashboard_name: "Jackson and Jackson HR Digital — Hiring Analytics"

targets:
  prod:
    mode: production
    workspace:
      host: https://fevm-stable-classic-zso77x-bx3.cloud.databricks.com
      root_path: /Workspace/Users/${workspace.current_user.userName}/.bundle/${bundle.name}/${bundle.target}
