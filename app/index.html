<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hire Right — J&J HRD 2030</title>
<script src="https://cdn.jsdelivr.net/npm/marked@11/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --db-red: #FF3621; --db-red-light: #FF6E56; --db-dark: #1B3139;
    --bg: #F8F6F4; --card: #FFFFFF; --text: #1B1B1B; --text-sub: #5A5A5A;
    --border: rgba(0,0,0,0.08); --shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  body { font-family:'DM Sans',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }

  /* ── Header ── */
  header { background:var(--db-dark); padding:12px 24px; display:flex; align-items:center; gap:16px; flex-shrink:0; box-shadow:0 2px 8px rgba(0,0,0,0.3); }
  .logo { color:var(--db-red); font-size:18px; font-weight:800; letter-spacing:1.5px; }
  .logo-sub { color:rgba(255,255,255,0.5); font-size:12px; font-weight:500; }
  .header-badge { margin-left:auto; background:rgba(255,54,33,0.15); border:1px solid rgba(255,54,33,0.3); color:var(--db-red); font-size:11px; font-weight:600; padding:4px 10px; border-radius:20px; }

  /* ── Layout ── */
  .layout { display:flex; flex:1; overflow:hidden; }

  /* ── Sidebar ── */
  .sidebar { width:280px; background:var(--card); border-right:1px solid var(--border); display:flex; flex-direction:column; flex-shrink:0; overflow-y:auto; }
  .sidebar-title { padding:16px 20px 8px; font-size:11px; font-weight:700; color:var(--text-sub); text-transform:uppercase; letter-spacing:1px; }
  .candidate-list { padding:0 12px 12px; display:flex; flex-direction:column; gap:4px; }
  .candidate-card { padding:10px 12px; border-radius:8px; cursor:pointer; transition:all 0.15s; border:1px solid transparent; }
  .candidate-card:hover { background:var(--bg); border-color:var(--border); }
  .candidate-card.hired { border-left:3px solid #00A972; }
  .candidate-card.not-hired { border-left:3px solid var(--db-red); }
  .cc-name { font-size:13px; font-weight:600; }
  .cc-title { font-size:11px; color:var(--text-sub); margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cc-score { font-size:11px; font-weight:700; margin-top:4px; }
  .cc-score.high { color:#00A972; }
  .cc-score.low { color:var(--db-red); }

  /* ── Chat ── */
  .chat-area { flex:1; display:flex; flex-direction:column; overflow:hidden; }
  .chat-messages { flex:1; overflow-y:auto; padding:24px; display:flex; flex-direction:column; gap:16px; }

  /* ── Welcome ── */
  .welcome { display:flex; flex-direction:column; align-items:center; justify-content:center; flex:1; text-align:center; padding:40px; }
  .welcome h2 { font-size:28px; font-weight:800; color:var(--db-dark); margin-bottom:8px; }
  .welcome p { color:var(--text-sub); font-size:15px; max-width:480px; line-height:1.6; }
  .suggestions { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:24px; max-width:560px; width:100%; }
  .suggestion { background:var(--card); border:1px solid var(--border); border-radius:12px; padding:14px 16px; cursor:pointer; text-align:left; font-size:13px; font-family:inherit; color:var(--text); transition:all 0.15s; }
  .suggestion:hover { border-color:var(--db-red); color:var(--db-red); box-shadow:var(--shadow); }

  /* ── Messages ── */
  .message { display:flex; gap:12px; max-width:780px; }
  .message.user { flex-direction:row-reverse; align-self:flex-end; }
  .message.user .bubble { background:var(--db-red); color:#fff; border-radius:20px 20px 4px 20px; }
  .message.assistant .bubble { background:var(--card); border:1px solid var(--border); border-radius:20px 20px 20px 4px; box-shadow:var(--shadow); }
  .bubble { padding:14px 18px; font-size:14px; line-height:1.65; max-width:640px; }
  .bubble p { margin-bottom:8px; }
  .bubble p:last-child { margin-bottom:0; }
  .bubble h3, .bubble h4 { margin:12px 0 6px; }
  .bubble ul, .bubble ol { padding-left:20px; margin-bottom:8px; }
  .bubble li { margin-bottom:4px; }
  .bubble strong { font-weight:700; }
  .bubble code { background:rgba(0,0,0,0.06); padding:2px 6px; border-radius:4px; font-size:12px; }
  .avatar { width:32px; height:32px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:14px; font-weight:700; flex-shrink:0; }
  .avatar.user { background:var(--db-red); color:#fff; }
  .avatar.assistant { background:var(--db-dark); color:#fff; }

  /* ── Typing ── */
  .typing-dots { display:flex; gap:4px; padding:6px 0; }
  .typing-dots span { width:7px; height:7px; background:var(--db-red); border-radius:50%; animation:bounce 1.2s infinite; }
  .typing-dots span:nth-child(2) { animation-delay:.2s; }
  .typing-dots span:nth-child(3) { animation-delay:.4s; }
  @keyframes bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.4} 40%{transform:scale(1);opacity:1} }

  /* ── Input ── */
  .chat-input-area { padding:16px 24px; background:var(--card); border-top:1px solid var(--border); }
  .input-row { display:flex; gap:8px; background:var(--bg); border:2px solid var(--border); border-radius:16px; padding:8px 12px; transition:border-color 0.15s; }
  .input-row:focus-within { border-color:var(--db-red); }
  #user-input { flex:1; border:none; background:transparent; font-family:inherit; font-size:14px; color:var(--text); resize:none; outline:none; min-height:24px; max-height:120px; }
  .send-btn { background:var(--db-red); border:none; border-radius:10px; width:36px; height:36px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:#fff; transition:background 0.15s; flex-shrink:0; align-self:flex-end; }
  .send-btn:hover { background:var(--db-red-light, #FF6E56); }
  .send-btn:disabled { background:#ccc; cursor:default; }
  .input-hint { font-size:11px; color:var(--text-sub); margin-top:6px; text-align:center; }

  /* ── New chat button ── */
  .new-chat-btn { margin:12px; padding:10px; background:var(--db-red); color:#fff; border:none; border-radius:8px; font-family:inherit; font-size:13px; font-weight:600; cursor:pointer; transition:opacity 0.15s; }
  .new-chat-btn:hover { opacity:0.9; }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">HIRE RIGHT</div>
    <div class="logo-sub">J&J HRD 2030 · AI-Powered Hiring</div>
  </div>
  <div class="header-badge">Databricks AI Agent</div>
</header>

<div class="layout">

  <!-- Sidebar: Candidate List -->
  <aside class="sidebar">
    <div class="sidebar-title">Candidates</div>
    <div class="candidate-list" id="candidate-list">
      <!-- populated by JS -->
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ New Conversation</button>
  </aside>

  <!-- Chat Area -->
  <section class="chat-area">
    <div class="chat-messages" id="chat-messages">
      <!-- Welcome screen -->
      <div class="welcome" id="welcome-screen">
        <h2>Hire Right Agent</h2>
        <p>Ask me anything about the Director of HR candidates — their background, ML predictions, comparisons, or email a report to your team.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="submitSuggestion(this.textContent)">Who are the top 3 candidates by total score?</button>
          <button class="suggestion" onclick="submitSuggestion(this.textContent)">Summarize Sarah Chen's background and predict her hiring score</button>
          <button class="suggestion" onclick="submitSuggestion(this.textContent)">Compare David Kim and Amanda Rodriguez</button>
          <button class="suggestion" onclick="submitSuggestion(this.textContent)">Email the hiring shortlist to robert.leach@databricks.com</button>
        </div>
      </div>
    </div>

    <!-- Input -->
    <div class="chat-input-area">
      <div class="input-row">
        <textarea id="user-input" placeholder="Ask about a candidate, request an analysis, or send a report..." rows="1"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()" title="Send">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        </button>
      </div>
      <div class="input-hint">Hire Right is powered by Databricks AI · Agent + Genie + ML Model</div>
    </div>
  </section>

</div>

<script>
  let conversationHistory = [];
  let isLoading = false;

  // ── Load candidates sidebar ──────────────────────────────────────────────
  async function loadCandidates() {
    try {
      const res = await fetch('/api/candidates');
      const data = await res.json();
      const list = document.getElementById('candidate-list');
      list.innerHTML = '';
      data.candidates.forEach(c => {
        const div = document.createElement('div');
        div.className = `candidate-card ${c.hired ? 'hired' : 'not-hired'}`;
        div.innerHTML = `
          <div class="cc-name">${c.name}</div>
          <div class="cc-title">${c.title}</div>
          <div class="cc-score ${c.total_score >= 80 ? 'high' : 'low'}">Score: ${c.total_score}/100${c.hired ? ' · Hired ✓' : ''}</div>`;
        div.onclick = () => submitSuggestion(`Tell me about ${c.name} (${c.id}) and predict their hiring score`);
        list.appendChild(div);
      });
    } catch (e) {
      console.error('Could not load candidates:', e);
    }
  }

  // ── Chat ─────────────────────────────────────────────────────────────────
  async function sendMessage(text) {
    const input = document.getElementById('user-input');
    const message = text || input.value.trim();
    if (!message || isLoading) return;

    // Hide welcome screen
    const welcome = document.getElementById('welcome-screen');
    if (welcome) welcome.remove();

    input.value = '';
    input.style.height = 'auto';
    isLoading = true;
    document.getElementById('send-btn').disabled = true;

    addMessage('user', message);
    const typingEl = addTyping();

    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          message,
          conversation_history: conversationHistory
        })
      });

      if (!res.ok) {
        const err = await res.json();
        throw new Error(err.detail || 'Request failed');
      }

      const data = await res.json();
      conversationHistory = data.conversation_history;

      typingEl.remove();
      addMessage('assistant', data.reply);
    } catch (e) {
      typingEl.remove();
      addMessage('assistant', `⚠️ Error: ${e.message}`);
    } finally {
      isLoading = false;
      document.getElementById('send-btn').disabled = false;
    }
  }

  function submitSuggestion(text) {
    sendMessage(text);
  }

  function addMessage(role, content) {
    const container = document.getElementById('chat-messages');
    const wrapper = document.createElement('div');
    wrapper.className = `message ${role}`;

    const avatar = document.createElement('div');
    avatar.className = `avatar ${role}`;
    avatar.textContent = role === 'user' ? 'U' : 'HR';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'assistant') {
      bubble.innerHTML = DOMPurify.sanitize(marked.parse(content));
    } else {
      bubble.textContent = content;
    }

    wrapper.appendChild(avatar);
    wrapper.appendChild(bubble);
    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight;
    return wrapper;
  }

  function addTyping() {
    const container = document.getElementById('chat-messages');
    const wrapper = document.createElement('div');
    wrapper.className = 'message assistant';
    wrapper.innerHTML = `<div class="avatar assistant">HR</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
    container.appendChild(wrapper);
    container.scrollTop = container.scrollHeight;
    return wrapper;
  }

  function newChat() {
    conversationHistory = [];
    const container = document.getElementById('chat-messages');
    container.innerHTML = `
      <div class="welcome" id="welcome-screen">
        <h2>Hire Right Agent</h2>
        <p>Ask me anything about the Director of HR candidates — their background, ML predictions, comparisons, or email a report to your team.</p>
        <div class="suggestions">
          <button class="suggestion" onclick="submitSuggestion(this.textContent)">Who are the top 3 candidates by total score?</button>
          <button class="suggestion" onclick="submitSuggestion(this.textContent)">Summarize Sarah Chen's background and predict her hiring score</button>
          <button class="suggestion" onclick="submitSuggestion(this.textContent)">Compare David Kim and Amanda Rodriguez</button>
          <button class="suggestion" onclick="submitSuggestion(this.textContent)">Email the hiring shortlist to robert.leach@databricks.com</button>
        </div>
      </div>`;
  }

  // ── Auto-resize textarea ─────────────────────────────────────────────────
  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
  document.getElementById('user-input').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // ── Init ──────────────────────────────────────────────────────────────────
  loadCandidates();
</script>
</body>
</html>
